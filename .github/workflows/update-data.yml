name: Update Data

on:
  schedule:
    # Full facility/map data — every 30 minutes (news has its own 1-min job)
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Run ETL pipeline
        run: python etl/run_pipeline.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ frontend/public/data/
          git diff --staged --quiet || git commit -m "chore: update humanitarian data"
          git push
