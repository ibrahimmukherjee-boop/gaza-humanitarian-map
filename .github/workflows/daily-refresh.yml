name: Daily full refresh

on:
  schedule:
    # Full news + political + facilities refresh every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r etl/requirements.txt feedparser requests

      - name: Run full ETL
        run: |
          python etl/fetch_all_news.py
          python etl/fetch_political_news.py
          python etl/run_pipeline.py
          python etl/update_meta.py
          python etl/generate_lite_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ frontend/public/data/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: daily automated refresh"
          git push
