name: Update News (every minute)

on:
  schedule:
    - cron: "* * * * *"
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "etl/**"
      - ".github/workflows/update-news.yml"

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: true

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Fetch all live feeds
        run: |
          python etl/fetch_all_news.py
          python etl/fetch_political_news.py
          python etl/update_meta.py
          python etl/generate_lite_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/news-lite.json data/political_news.json \
            data/meta.json data/meta-lite.json \
            frontend/public/data/news.json frontend/public/data/news-lite.json \
            frontend/public/data/political_news.json \
            frontend/public/data/meta.json frontend/public/data/meta-lite.json
          git diff --staged --quiet && echo "No file changes — refreshing meta heartbeat only" || true
          python etl/update_meta.py
          git add data/meta.json data/meta-lite.json frontend/public/data/meta.json frontend/public/data/meta-lite.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: live feed refresh [automated]"
          git pull --rebase origin main
          git push origin main
